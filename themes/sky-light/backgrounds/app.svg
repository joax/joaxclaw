<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#d8ecfd"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#c3e2fb" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#c3e2fb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <g filter="url(#soft)">
    <ellipse cx="330" cy="230" rx="420" ry="300" fill="url(#glowB)"/>
    <ellipse cx="1280" cy="180" rx="380" ry="260" fill="url(#glowA)"/>
    <ellipse cx="1150" cy="760" rx="520" ry="340" fill="url(#glowA)"/>
    <ellipse cx="220" cy="820" rx="360" ry="280" fill="url(#glowB)"/>
    <ellipse cx="760" cy="520" rx="480" ry="300" fill="url(#glowB)"/>
  </g>
</svg>
