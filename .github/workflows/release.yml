name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Check if the version in package.json already has a release ──────────────
  check:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.pkg.outputs.version }}
      should_release: ${{ steps.guard.outputs.should_release }}
    steps:
      - uses: actions/checkout@v5

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if release v${{ steps.pkg.outputs.version }} already exists
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          if gh release view "v${VERSION}" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release v${VERSION} already exists — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release for v${VERSION} — will build and release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Create the release first, with notes from CHANGELOG.md ──────────────────
  # A single job owns the release body so the build jobs (which only upload
  # assets) can never race it to an empty-bodied release.
  release:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Extract changelog notes for v${{ needs.check.outputs.version }}
        id: changelog
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          # Pull the body of the matching "## [VERSION]" section (until the next "## [").
          NOTES=$(awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/d')
          if [ -z "$NOTES" ]; then
            echo "::warning::No CHANGELOG.md entry for v${VERSION} — falling back to a generic note."
            NOTES="Release v${VERSION}. See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create draft GitHub Release (notes only)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: JoaxClaw v${{ needs.check.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          # GitHub makes a *published* release immutable — assets can only be added
          # while it's still a draft. So create it as a draft here; the build jobs
          # attach the installers, and the final publish job flips it to published.
          draft: true
          prerelease: ${{ contains(needs.check.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Linux x64 DEB ───────────────────────────────────────────────────────────
  build-linux:
    needs: [check, release]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y fakeroot dpkg rpm

      - name: Install npm dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package DEB
        run: npx electron-builder --linux deb --x64 --publish never

      # No upload-artifact: the installer is attached to the GitHub Release below
      # (durable, and separate from the Actions storage quota). Keeping a 90-day
      # artifact copy too just burned through the account's Actions storage.
      - name: Add DEB to the draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          # Keep it a draft while attaching — the publish job flips it once both
          # installers are in. (Omitting draft would default to false and publish
          # the release early, re-locking it before the other installer uploads.)
          draft: true
          files: dist/*.deb
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── macOS universal DMG (unsigned) ──────────────────────────────────────────
  build-mac:
    needs: [check, release]
    if: needs.check.outputs.should_release == 'true'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package DMG (universal, unsigned)
        run: npx electron-builder --mac dmg --universal --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # No upload-artifact (see the DEB job) — the DMG is attached to the Release.
      - name: Add DMG to the draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          draft: true   # see build-linux — stay a draft until the publish job
          files: dist/*.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish: flip the draft to a real release once both installers are attached ─
  # Assets can't be added after publish (immutable releases), so this runs last.
  publish:
    needs: [check, build-linux, build-mac]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Publish the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.check.outputs.version, '-') }}
          make_latest: ${{ !contains(needs.check.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Prune: keep only the 5 most recent releases (older releases removed; tags kept) ─
  prune:
    needs: [check, publish]
    if: needs.check.outputs.should_release == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/prune-releases.yml
    with:
      keep: '5'
