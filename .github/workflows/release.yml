name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Check if the version in package.json already has a release ──────────────
  check:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.pkg.outputs.version }}
      should_release: ${{ steps.guard.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if release v${{ steps.pkg.outputs.version }} already exists
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          if gh release view "v${VERSION}" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release v${VERSION} already exists — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release for v${VERSION} — will build and release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Build DEB and publish release ──────────────────────────────────────────
  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y fakeroot dpkg rpm

      - name: Install npm dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package DEB
        run: npx electron-builder --linux deb --x64 --publish never

      - name: Show dist contents
        run: ls -lh dist/

      - name: Extract changelog for v${{ needs.check.outputs.version }}
        id: changelog
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          # Extract everything between ## [VERSION] and the next ## [ heading
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Strip leading/trailing blank lines
          NOTES=$(echo "$NOTES" | sed '/^[[:space:]]*$/d' | sed '1{/^$/d}')
          printf 'notes<<EOF\n%s\nEOF\n' "$NOTES" >> "$GITHUB_OUTPUT"

      - name: Upload DEB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: joaxclaw-${{ needs.check.outputs.version }}-linux-x64
          path: dist/*.deb
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: JoaxClaw v${{ needs.check.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*.deb
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(needs.check.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
